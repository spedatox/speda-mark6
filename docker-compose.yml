services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: speda
      POSTGRES_PASSWORD: speda
      POSTGRES_DB: speda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speda"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .                            # repo root — uv workspace + lock live here
      dockerfile: packages/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      # Single source of secrets — same file the dev backend (uvicorn) reads.
      - packages/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://speda:speda@postgres:5432/speda
      PLAYWRIGHT_MCP_URL: http://playwright-mcp:3000
      SANDBOX_URL: http://sandbox:9000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/speda_outputs:/tmp/speda_outputs

  # The automation organ — n8n owns ALL scheduling and polling (CLAUDE.md).
  # SPEDA composes workflows over its REST API; fired watchers call back into
  # the app's /trigger endpoint over this internal network.
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"          # editor UI — visit http://<server>:5678 to set up + create the API key
    environment:
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n

  # SPEDA's "capable computer" — isolated container it runs commands in.
  # No host mounts, no secrets, resource-limited, reachable only on this network.
  sandbox:
    build: ./packages/sandbox
    # No host port mapping — only the app talks to it over the internal network.
    expose:
      - "9000"
    volumes:
      - sandbox_workspace:/workspace
    # Resource ceilings so a runaway command can't starve the host.
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Reverse proxy + automatic HTTPS for your domain. Only starts when you run
  # with `--profile domain` and DOMAIN is set (deploy.sh does this for you).
  caddy:
    image: caddy:2-alpine
    profiles: ["domain"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  sandbox_workspace:
  n8n_data:
  caddy_data:
  caddy_config:
