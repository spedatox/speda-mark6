services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: speda
      POSTGRES_PASSWORD: speda
      POSTGRES_DB: speda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speda"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://speda:speda@postgres:5432/speda
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/speda_outputs:/tmp/speda_outputs

volumes:
  postgres_data:
