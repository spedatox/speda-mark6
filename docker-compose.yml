services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: speda
      POSTGRES_PASSWORD: speda
      POSTGRES_DB: speda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speda"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./packages/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://speda:speda@postgres:5432/speda
      PLAYWRIGHT_MCP_URL: http://playwright-mcp:3000
      SANDBOX_URL: http://sandbox:9000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/speda_outputs:/tmp/speda_outputs

  # SPEDA's "capable computer" — isolated container it runs commands in.
  # No host mounts, no secrets, resource-limited, reachable only on this network.
  sandbox:
    build: ./packages/sandbox
    # No host port mapping — only the app talks to it over the internal network.
    expose:
      - "9000"
    volumes:
      - sandbox_workspace:/workspace
    # Resource ceilings so a runaway command can't starve the host.
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  postgres_data:
  sandbox_workspace:
