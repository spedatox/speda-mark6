appId: com.spedatox.speda-mark6
productName: SPEDA Mark VI

directories:
  output: dist
  buildResources: build

# electron-vite outputs the compiled main/preload/renderer to out/.
files:
  - out/**
  - package.json

# Windows installer (NSIS) — lets you pick the install dir.
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
  # Multi-size .ico (16→256) generated from mark6_icon.png at the repo root.
  # A real .ico beats handing electron-builder a 4096px PNG: Windows picks the
  # right size for the taskbar, Explorer, and the installer instead of rescaling.
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: SPEDA Mark VI

# No code signing for personal/internal builds (Windows SmartScreen will warn;
# that's expected for an unsigned in-house app).
